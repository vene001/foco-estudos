<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudy-site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #09090e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh; /* Trava a altura na tela */
            padding: 20px;
            overflow: hidden; /* Remove a rolagem no celular */
        }

        .profile-container {
            background-color: #12121a;
            border: 1px solid #1f1f2e;
            border-radius: 20px;
            padding: 30px 20px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #8a2be2;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .username {
            font-size: 0.9rem;
            color: #8a2be2;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none;
            text-align: center;
        }

        .btn-pix {
            background-color: #00b4d8;
            color: #ffffff;
        }

        .btn-pix:hover {
            background-color: #0096c7;
        }

        .btn-discord {
            background-color: #5865F2;
            color: #ffffff;
        }

        .btn-discord:hover {
            background-color: #4752C4;
        }

        .toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #00b4d8;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            transition: bottom 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img class="profile-img" src="ssstik.io_1779973961282.webp" alt="Perfil">
        <h2>Estudy-site</h2>
        <div class="username">@estudy_site</div>

        <button class="btn btn-pix" onclick="copiarPix()">Copiar Chave Pix para Apoiar</button>
        <a href="https://discord.gg/SEU_CONVITE" target="_blank" class="btn btn-discord">Entrar no Discord</a>
    </div>

    <div class="toast" id="toast">Chave Pix copiada!</div>

    <script>
        function copiarPix() {
            const chavePix = "0ba45fc9-d53f-4935-b263-22eca573921c";
            
            navigator.clipboard.writeText(chavePix).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                alert("Erro ao copiar.");
            });
        }
    </script>
</body>
</html>
