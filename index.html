<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Foco nos Estudos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #09090e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh; /* Força o tamanho exato da tela */
            padding: 20px;
            overflow: hidden; /* Bloqueia completamente a rolagem no celular */
        }

        .profile-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 35px 25px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #8b5cf6;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .username {
            font-size: 0.9rem;
            color: #a78bfa;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        /* Cores dos Botões */
        .btn-pix {
            background-color: #00b4d8;
            color: #ffffff;
        }

        .btn-pix:hover {
            background-color: #0096c7;
            transform: translateY(-2px);
        }

        .btn-discord {
            background-color: #5865F2;
            color: #ffffff;
        }

        .btn-discord:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Notificação de Copiado */
        .toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            white-space: nowrap;
        }

        .toast.show {
            bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- Foto Roxa com tratamento de erros de extensão caso mude no celular -->
        <img class="profile-img" src="ssstik.io_1779973961282.webp" onerror="this.src='ssstik.io_1779973961282.jpg'; this.onerror=function(){this.src='ssstik.io_1779973961282.jpeg';};" alt="Perfil">
        
        <h2>Foco no Desenvolvimento</h2>
        <div class="username">@estudodev</div>

        <!-- Botão Pix -->
        <button class="btn btn-pix" onclick="copiarPix()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Copiar Chave Pix para Apoiar
        </button>

        <!-- Botão Discord -->
        <a href="https://discord.gg/SEU_CONVITE" target="_blank" class="btn btn-discord">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994.021-.041.001-.09-.041-.106a13.094 13.094 0 0 1-1.873-.894.077.077 0 0 1-.008-.128c.126-.093.252-.19.372-.287a.075.075 0 0 1 .077-.011c3.92 1.793 8.18 1.793 12.061 0a.073.073 0 0 1 .078.009c.12.099.246.195.373.289a.077.077 0 0 1-.006.127 12.298 12.298 0 0 1-1.873.894.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.156 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.156 2.418z"/></svg>
            Entrar no Discord
        </a>
    </div>

    <!-- Alerta Flutuante -->
    <div class="toast" id="toast">Chave Pix copiada com sucesso!</div>

    <script>
        function copiarPix() {
            // Sua chave aleatória do Nubank sem espaços extras
            const chavePix = "0ba45fc9-d53f-4935-b263-22eca573921c";
            
            navigator.clipboard.writeText(chavePix).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            }).catch(err => {
                alert("Erro ao copiar chave: O navegador bloqueou a ação.");
            });
        }
    </script>
</body>
</html>
